# Inspired heavily by https://circleci.com/blog/using-circleci-workflows-to-replicate-docker-hub-automated-builds/
version: 2.1
executors:
  docker-publisher:
    environment:
      IMAGE_NAME: o19s/splainer
    docker:
      - image: circleci/python
commands:
  https-checkout:
    description: "Clone over HTTPS so we don't need an SSH deploy key on this public repo."
    steps:
      - run:
          name: Checkout (HTTPS)
          command: |
            set -e
            git clone "https://github.com/${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}.git" .
            if [ -n "${CIRCLE_PULL_REQUEST:-}" ]; then
              PR_NUMBER="${CIRCLE_PULL_REQUEST##*/}"
              git fetch origin "pull/${PR_NUMBER}/merge" \
                || git fetch origin "pull/${PR_NUMBER}/head"
            fi
            git checkout "${CIRCLE_SHA1}"
jobs:
  test:
    docker:
      - image: cimg/node:20.19
    steps:
      - https-checkout
      - restore_cache:
          keys:
            - yarn-deps-v1-{{ checksum "yarn.lock" }}
            - yarn-deps-v1-
      - run:
          name: Install dependencies
          command: yarn install --frozen-lockfile
      - save_cache:
          key: yarn-deps-v1-{{ checksum "yarn.lock" }}
          paths:
            - node_modules
            - ~/.cache/yarn
      - run:
          name: Run unit and component tests
          command: yarn test
  build:
    executor: docker-publisher
    steps:
      - https-checkout
      - setup_remote_docker
      - run:
          name: Build Docker image now
          command: |
            docker build -t $IMAGE_NAME:latest .
      - run:
          name: Archive Docker image
          command: docker save -o image.tar $IMAGE_NAME
      - persist_to_workspace:
          root: .
          paths:
            - ./image.tar
  publish-latest:
    executor: docker-publisher
    steps:
      - attach_workspace:
          at: /tmp/workspace
      - setup_remote_docker
      - run:
          name: Load archived Docker image
          command: docker load -i /tmp/workspace/image.tar

      - run: echo "$DOCKER_PASS" | docker login -u "$DOCKER_USER" --password-stdin

      - run: docker push $IMAGE_NAME:latest && sleep 10

  publish-splainerio:
    executor: docker-publisher
    steps:
      - attach_workspace:
          at: /tmp/workspace
      - setup_remote_docker
      - run:
          name: Load archived Docker image
          command: docker load -i /tmp/workspace/image.tar

      - run: id=$(docker create o19s/splainer) && echo "$id" && docker cp $id:/home/splainer/dist ./app

      - run: ls -alh ./app

      - run:
          name: Install AWS cli
          command: pip3 install awscli --upgrade --user

      - run: ls -alh /home/circleci/.local/bin

      - run:
          name: Deploy Main to s3
          command: /home/circleci/.local/bin/aws s3 sync ./app s3://splainer.io/ --delete

workflows:
  version: 2
  build-main:
    jobs:
      - test
      - build:
          requires:
            - test
      - publish-latest:
          requires:
            - build
          filters:
            branches:
              only: main
      - publish-splainerio:
          requires:
            - build
          filters:
            branches:
              only: main
