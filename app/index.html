<!doctype html>
<html class="no-js">
  <head>
    <meta charset="utf-8" />
    <title></title>
    <meta name="description" content="" />
    <meta name="viewport" content="width=device-width" />
    <!-- Place favicon.ico and apple-touch-icon.png in the root directory -->
    <!-- build:css(app) styles/vendor.css -->
    <link rel="stylesheet" href="node_modules/bootstrap/dist/css/bootstrap.css" />
    <link rel="stylesheet" href="node_modules/ng-json-explorer/dist/angular-json-explorer.css" />
    <!-- endbuild -->
    <!-- build:css(.tmp) styles/main.css -->
    <link rel="stylesheet" href="styles/main.css" />
    <link rel="stylesheet" href="styles/panes.css" />
    <link rel="stylesheet" href="styles/stackedChart.css" />
    <!-- endbuild -->
  </head>
  <body ng-app="splain-app">
    <!--[if lt IE 7]>
      <p class="browsehappy">
        You are using an <strong>outdated</strong> browser. Please
        <a href="http://browsehappy.com/">upgrade your browser</a> to improve your experience.
      </p>
    <![endif]-->
    <!-- Add your site or application content here -->
    <div class="pane_container" ng-controller="SearchResultsCtrl">
      <div class="pane_main">
        <header class="navbar-inverse navbar-secondary clearfix ng-scope">
          <a
            ng-show="currSearch.state === currSearch.NO_SEARCH"
            style="z-index: 10000"
            href="https://github.com/o19s/splainer"
            ><img
              style="position: absolute; top: 0; right: 0; border: 0"
              src="https://camo.githubusercontent.com/38ef81f8aca64bb9a64448d0d70f1308ef5341ab/68747470733a2f2f73332e616d617a6f6e6177732e636f6d2f6769746875622f726962626f6e732f666f726b6d655f72696768745f6461726b626c75655f3132313632312e706e67"
              alt="Fork me on GitHub"
              data-canonical-src="https://s3.amazonaws.com/github/ribbons/forkme_right_darkblue_121621.png"
          /></a>
          <div class="navbar-header">
            <h3
              class="navbar-brand"
              style="cursor: pointer"
              dispatch-on-click="closeEast"
              ng-click="search.reset()"
            >
              <a style="color: inherit; text-decoration: inherit" href="#">Splainer</a>
            </h3>
            <small class="tiny_sub"
              >By <a href="http://opensourceconnections.com">OpenSource Connections</a></small
            >
          </div>
          <ul class="nav navbar-nav navbar-right">
            <li>
              <a
                ng-show="currSearch.state !==currSearch.NO_SEARCH"
                data-toggle="tooltip"
                title="Take a Tour"
                href="help.html"
                target="_blank"
              >
                <span class="glyphicon glyphicon-question-sign"></span> Take a Tour
              </a>
            </li>
            <li>
              <a
                ng-show="currSearch.state !== currSearch.NO_SEARCH"
                dispatch-on-click="toggleEast"
                href=""
                type="button"
                ng-click="devSettingsSolr.sidebar = !devSettingsSolr.sidebar"
              >
                <span
                  ng-class="{true: 'glyphicon glyphicon-chevron-left', false: ''}[devSettingsSolr.sidebar]"
                ></span>
                Tweak
                <span
                  ng-class="{true: 'glyphicon-chevron-right', false: ''}[!devSettingsSolr.sidebar]"
                  class="glyphicon glyphicon-chevron-right"
                ></span>
              </a>
            </li>
          </ul>
        </header>

        <div class="container">
          <search-results-island curr-search="currSearch"></search-results-island>
          <div ng-show="currSearch.state === currSearch.NO_SEARCH">
            <start-url-island search="search"></start-url-island>
          </div>
        </div>

        <div class="footer">
          <p style="margin: 0px">
            From the
            <a target="_blank" href="http://opensourceconnections.com"
              ><img class="osc_logo" alt="OSC Logo" src="images/OSC-logomark-color-sm.png" />
              OpenSource Connections</a
            >
            team
          </p>
          <small
            >Our mission is to empower great search teams |
            <a target="_blank" href="http://www.opensourceconnections.com/blog">Blog</a> |
            <a target="_blank" href="http://www.opensourceconnections.com/what-we-do/">Services</a>
            | <a href="mailto:hello@opensourceconnections.com">Contact Us</a></small
          >
        </div>
      </div>
      <div class="east-slider"></div>
      <div class="pane_east">
        <h3>Search Controls</h3>
        <!-- Settings island (PR 7). Replaces the inline ng-controller="SettingsCtrl"
             form. The directive shim at app/scripts/directives/settings.js mounts
             the Preact island built from app/scripts/islands/settings.jsx. The
             legacy <custom-headers> directive is intentionally still alive for
             startUrl.html (PRs 8-10); PR 11 deletes both. -->
        <settings-island curr-search="currSearch" search="search"></settings-island>
      </div>
    </div>

    <!-- Shared host for island-backed modals (see modalRegistry.js).
         Auto-created at runtime if missing, but declaring it here keeps
         the DOM structure stable for tests and avoids a layout shift on
         first modal open. -->
    <div id="splainer-modal-root"></div>

    <!-- Google Analytics:-->
    <script>
      (function (i, s, o, g, r, a, m) {
        i['GoogleAnalyticsObject'] = r;
        ((i[r] =
          i[r] ||
          function () {
            (i[r].q = i[r].q || []).push(arguments);
          }),
          (i[r].l = 1 * new Date()));
        ((a = s.createElement(o)), (m = s.getElementsByTagName(o)[0]));
        a.async = 1;
        a.src = g;
        m.parentNode.insertBefore(a, m);
      })(window, document, 'script', '//www.google-analytics.com/analytics.js', 'ga');

      ga('create', 'UA-51758301-2', 'auto');
      ga('send', 'pageview');
    </script>

    <!-- excluded from vendor.js below to be replaced with cdn links -->
    <script src="node_modules/jquery/dist/jquery.js"></script>
    <script src="node_modules/angular/angular.js"></script>
    <script src="node_modules/angular-sanitize/angular-sanitize.js"></script>

    <!-- build:js(app) scripts/oldieshim.js -->
    <!--[if lt IE 9]>
      <script src="node_modules/es5-shim/es5-shim.js"></script>
      <script src="node_modules/json3/lib/json3.min.js"></script>
    <![endif]-->
    <!-- endbuild -->
    <!-- build:js(app) scripts/vendor.js -->
    <script src="node_modules/ace-builds/src-min-noconflict/ace.js"></script>
    <script src="node_modules/ace-builds/src-min-noconflict/ext-language_tools.js"></script>

    <script src="node_modules/angular-local-storage/dist/angular-local-storage.js"></script>
    <script src="node_modules/angular-ui-bootstrap/dist/ui-bootstrap-tpls.js"></script>
    <script src="node_modules/angular-ui-ace/src/ui-ace.js"></script>
    <script src="node_modules/bootstrap/dist/js/bootstrap.js"></script>
    <script src="node_modules/json3/lib/json3.js"></script>
    <script src="node_modules/ng-json-explorer/dist/angular-json-explorer.js"></script>
    <!-- urijs MUST load before the wired IIFE: splainer-search 3.0.0 expects
         globalThis.URI at call time. -->
    <script src="node_modules/urijs/src/URI.js"></script>
    <script src="node_modules/splainer-search/dist/splainer-search-wired.js"></script>
    <!-- Preact (+ hooks) for the post-Angular view islands (PR 6 onward).
         UMD builds attach to window.preact and window.preactHooks. The .jsx
         island sources are pre-built into IIFEs by `yarn build:islands`
         (vite.islands.config.js) which references these as externals. -->
    <script src="node_modules/preact/dist/preact.umd.js"></script>
    <script src="node_modules/preact/hooks/dist/hooks.umd.js"></script>

    <!-- endbuild -->

    <!-- build:js({.tmp,app}) scripts/scripts.js -->
    <script src="scripts/panes.js"></script>
    <script src="scripts/app.js"></script>
    <script src="scripts/services/splainerSearchShim.js"></script>
    <!-- Preact islands — built from .jsx sources by `yarn build:islands`
         (see vite.islands.config.js). Each file attaches itself to
         window.SplainerIslands.<name> as a side effect. -->
    <script src="scripts/islands/dist/customHeaders.js"></script>
    <script src="scripts/islands/dist/settings.js"></script>
    <script src="scripts/islands/dist/startUrl.js"></script>
    <script src="scripts/islands/dist/modalRegistry.js"></script>
    <script src="scripts/islands/dist/detailedDoc.js"></script>
    <script src="scripts/islands/dist/docExplain.js"></script>
    <script src="scripts/islands/dist/searchResults.js"></script>
    <script src="scripts/factories/Search.js"></script>
    <script src="scripts/directives/customHeaders.js"></script>
    <script src="scripts/directives/settings.js"></script>
    <script src="scripts/directives/dispatchOnClick.js"></script>
    <script src="scripts/directives/searchResults.js"></script>
    <script src="scripts/directives/startUrl.js"></script>
    <!-- Phase 11a: pure-JS service modules (built from ESM by
         `yarn build:islands`). Must load before the Angular wrappers
         below so globalThis.SplainerServices.* is populated. -->
    <script src="scripts/services/dist/esSettings.js"></script>
    <script src="scripts/services/dist/osSettings.js"></script>
    <script src="scripts/services/dist/solrSettings.js"></script>
    <script src="scripts/services/dist/splSearch.js"></script>
    <script src="scripts/services/solrSettingsSvc.js"></script>
    <script src="scripts/services/esSettingsSvc.js"></script>
    <script src="scripts/services/osSettingsSvc.js"></script>
    <script src="scripts/services/splSearchSvc.js"></script>
    <script src="scripts/services/settingsStoreSvc.js"></script>
    <script src="scripts/controllers/searchResults.js"></script>
    <script src="scripts/ace-config.js"></script>
    <!-- endbuild -->
  </body>
</html>
