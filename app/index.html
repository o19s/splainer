<!doctype html>
<html class="no-js">
  <head>
    <meta charset="utf-8" />
    <title></title>
    <meta name="description" content="" />
    <meta name="viewport" content="width=device-width" />
    <!-- Place favicon.ico and apple-touch-icon.png in the root directory -->
    <link rel="stylesheet" href="node_modules/bootstrap/dist/css/bootstrap.css" />
    <link rel="stylesheet" href="styles/main.css" />
    <link rel="stylesheet" href="styles/panes.css" />
    <link rel="stylesheet" href="styles/stackedChart.css" />
  </head>
  <body>
    <!-- Add your site or application content here -->
    <div class="pane_container">
      <div class="pane_main">
        <header class="navbar-inverse navbar-secondary clearfix">
          <a
            id="fork-ribbon"
            style="z-index: 10000"
            href="https://github.com/o19s/splainer"
            ><img
              style="position: absolute; top: 0; right: 0; border: 0"
              src="https://camo.githubusercontent.com/38ef81f8aca64bb9a64448d0d70f1308ef5341ab/68747470733a2f2f73332e616d617a6f6e6177732e636f6d2f6769746875622f726962626f6e732f666f726b6d655f72696768745f6461726b626c75655f3132313632312e706e67"
              alt="Fork me on GitHub"
              data-canonical-src="https://s3.amazonaws.com/github/ribbons/forkme_right_darkblue_121621.png"
          /></a>
          <div class="navbar-header">
            <h3
              class="navbar-brand"
              style="cursor: pointer"
              id="brand-btn"
            >
              <a style="color: inherit; text-decoration: inherit" href="#">Splainer</a>
            </h3>
            <small class="tiny_sub"
              >By <a href="http://opensourceconnections.com">OpenSource Connections</a></small
            >
          </div>
          <ul class="nav navbar-nav navbar-right">
            <li>
              <a
                id="help-link"
                style="display:none"
                title="Take a Tour"
                href="help.html"
                target="_blank"
              >
                <span class="glyphicon glyphicon-question-sign"></span> Take a Tour
              </a>
            </li>
            <li>
              <a
                id="tweak-btn"
                style="display:none"
                href=""
                type="button"
              >
                <span id="tweak-chevron-left"></span>
                Tweak
                <span id="tweak-chevron-right" class="glyphicon glyphicon-chevron-right"></span>
              </a>
            </li>
          </ul>
        </header>

        <div class="container">
          <div id="search-results-mount"></div>
          <div id="start-url-wrapper">
            <div id="start-url-mount"></div>
          </div>
        </div>

        <div class="footer">
          <p style="margin: 0px">
            From the
            <a target="_blank" href="http://opensourceconnections.com"
              ><img class="osc_logo" alt="OSC Logo" src="images/OSC-logomark-color-sm.png" />
              OpenSource Connections</a
            >
            team
          </p>
          <small
            >Our mission is to empower great search teams |
            <a target="_blank" href="http://www.opensourceconnections.com/blog">Blog</a> |
            <a target="_blank" href="http://www.opensourceconnections.com/what-we-do/">Services</a>
            | <a href="mailto:hello@opensourceconnections.com">Contact Us</a></small
          >
        </div>
      </div>
      <div class="east-slider"></div>
      <div class="pane_east">
        <h3>Search Controls</h3>
        <div id="settings-mount"></div>
      </div>
    </div>

    <!-- Shared host for island-backed modals (see modalRegistry.js).
         Auto-created at runtime if missing, but declaring it here keeps
         the DOM structure stable for tests and avoids a layout shift on
         first modal open. -->
    <div id="splainer-modal-root"></div>

    <!-- Google Analytics:-->
    <script>
      (function (i, s, o, g, r, a, m) {
        i['GoogleAnalyticsObject'] = r;
        ((i[r] =
          i[r] ||
          function () {
            (i[r].q = i[r].q || []).push(arguments);
          }),
          (i[r].l = 1 * new Date()));
        ((a = s.createElement(o)), (m = s.getElementsByTagName(o)[0]));
        a.async = 1;
        a.src = g;
        m.parentNode.insertBefore(a, m);
      })(window, document, 'script', '//www.google-analytics.com/analytics.js', 'ga');

      ga('create', 'UA-51758301-2', 'auto');
      ga('send', 'pageview');
    </script>

    <!-- Vendor scripts -->
    <script src="node_modules/ace-builds/src-min-noconflict/ace.js"></script>
    <script src="node_modules/ace-builds/src-min-noconflict/ext-language_tools.js"></script>
    <!-- urijs MUST load before the wired IIFE: splainer-search 3.0.0 expects
         globalThis.URI at call time. -->
    <script src="node_modules/urijs/src/URI.js"></script>
    <script src="node_modules/splainer-search/dist/splainer-search-wired.js"></script>
    <!-- Preact (+ hooks) for the view islands.
         UMD builds attach to window.preact and window.preactHooks. The .jsx
         island sources are pre-built into IIFEs by `yarn build:islands`
         (vite.islands.config.js) which references these as externals. -->
    <script src="node_modules/preact/dist/preact.umd.js"></script>
    <script src="node_modules/preact/hooks/dist/hooks.umd.js"></script>

    <!-- App scripts -->
    <script src="scripts/panes.js"></script>
    <!-- Preact islands — built from .jsx sources by `yarn build:islands`
         (see vite.islands.config.js). Each file attaches itself to
         window.SplainerIslands.<name> as a side effect. -->
    <script src="scripts/islands/dist/customHeaders.js"></script>
    <script src="scripts/islands/dist/settings.js"></script>
    <script src="scripts/islands/dist/startUrl.js"></script>
    <script src="scripts/islands/dist/modalRegistry.js"></script>
    <script src="scripts/islands/dist/detailedDoc.js"></script>
    <script src="scripts/islands/dist/docExplain.js"></script>
    <script src="scripts/islands/dist/searchResults.js"></script>
    <!-- Pure-JS service modules (built from ESM by `yarn build:islands`).
         Must load before bootstrap.js so globalThis.SplainerServices.* is populated. -->
    <script src="scripts/services/dist/esSettings.js"></script>
    <script src="scripts/services/dist/osSettings.js"></script>
    <script src="scripts/services/dist/solrSettings.js"></script>
    <script src="scripts/services/dist/splSearch.js"></script>
    <script src="scripts/services/dist/settingsStore.js"></script>
    <script src="scripts/services/dist/Search.js"></script>
    <!-- Bootstrap script — wires services and islands together. -->
    <script src="scripts/bootstrap.js"></script>
    <script src="scripts/ace-config.js"></script>
  </body>
</html>
