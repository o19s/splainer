<!doctype html>
<html class="no-js">
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' http: https:; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src http: https:; object-src 'none'; base-uri 'self'; form-action 'self'"
    />
    <title>Splainer — the open-source search sandbox</title>
    <meta
      name="description"
      content="Paste your Solr or Elasticsearch query URL and Splainer shows you parsed, summarized explain output alongside your documents — so you can tune relevance without digging through raw explain debug."
    />
    <meta name="viewport" content="width=device-width" />
    <!-- Place favicon.ico and apple-touch-icon.png in the root directory -->
    <link rel="stylesheet" href="node_modules/bootstrap/dist/css/bootstrap.css" />
    <link rel="stylesheet" href="styles/main.css" />
    <link rel="stylesheet" href="styles/panes.css" />
    <link rel="stylesheet" href="styles/stackedChart.css" />
  </head>
  <body>
    <!-- Add your site or application content here -->
    <div class="pane_container">
      <div class="pane_main">
        <header class="navbar-inverse navbar-secondary clearfix">
          <!-- Vendored: classic "Fork me on GitHub" ribbon (was camo.githubusercontent.com → s3.amazonaws.com/github/ribbons/; hotlinks often break). -->
          <a
            id="fork-ribbon"
            style="z-index: 10000"
            href="https://github.com/o19s/splainer"
            ><img
              style="position: absolute; top: 0; right: 0; border: 0"
              src="images/forkme_right_darkblue_121621.png"
              alt="Fork me on GitHub"
          /></a>
          <div class="navbar-header">
            <h3
              class="navbar-brand"
              style="cursor: pointer"
              id="brand-btn"
            >
              <a style="color: inherit; text-decoration: inherit" href="#">Splainer</a>
            </h3>
            <small class="tiny_sub"
              >By <a href="http://opensourceconnections.com">OpenSource Connections</a></small
            >
          </div>
          <ul class="nav navbar-nav navbar-right">
            <li>
              <a
                id="help-link"
                style="display:none"
                title="Take a Tour"
                href="help.html"
                target="_blank" rel="noopener"
              >
                <span class="glyphicon glyphicon-question-sign"></span> Take a Tour
              </a>
            </li>
            <li>
              <a
                id="tweak-btn"
                style="display:none"
                href=""
                type="button"
              >
                <span id="tweak-chevron-left"></span>
                Tweak
                <span id="tweak-chevron-right" class="glyphicon glyphicon-chevron-right"></span>
              </a>
            </li>
          </ul>
        </header>

        <div class="container">
          <div id="search-results-mount"></div>
          <div id="start-url-wrapper">
            <div id="start-url-mount"></div>
          </div>
        </div>

        <div class="footer">
          <p style="margin: 0px">
            From the
            <a target="_blank" rel="noopener" href="http://opensourceconnections.com"
              ><img class="osc_logo" alt="OSC Logo" src="images/OSC-logomark-color-sm.png" />
              OpenSource Connections</a
            >
            team
          </p>
          <small
            >Our mission is to empower great search teams |
            <a target="_blank" rel="noopener" href="http://www.opensourceconnections.com/blog">Blog</a> |
            <a target="_blank" rel="noopener" href="http://www.opensourceconnections.com/what-we-do/">Services</a>
            | <a href="mailto:hello@opensourceconnections.com">Contact Us</a></small
          >
        </div>
      </div>
      <div class="east-slider"></div>
      <div class="pane_east">
        <h3>Search Controls</h3>
        <div id="settings-mount"></div>
      </div>
    </div>

    <!-- Shared host for island-backed modals (see modalRegistry.js).
         Auto-created at runtime if missing, but declaring it here keeps
         the DOM structure stable for tests and avoids a layout shift on
         first modal open. -->
    <div id="splainer-modal-root"></div>

    <!-- Application entry point — imports all islands, services, panes, and
         splainer-search (wired) as ES modules. CodeMirror 6 is bundled by Vite. -->
    <script type="module" src="scripts/main.js"></script>
  </body>
</html>
